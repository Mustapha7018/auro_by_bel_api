# Render Blueprint — https://render.com
# Deploy: Render dashboard → New → Blueprint → connect this repo.
# Render reads this file and creates the Postgres DB + web service, wiring
# DATABASE_URL automatically and generating a JWT_SECRET.

databases:
  - name: aura-db
    databaseName: aura
    plan: free

services:
  - type: web
    name: aura-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: aura-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://aurabybel.shop,https://www.aurabybel.shop
